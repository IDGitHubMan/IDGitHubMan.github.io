<!DOCTYPE html>
<html>
    <head>

        <div id="sketchView"></div>

                <div class="rule">

                    <label for="c111">111</label>
                </div>
                <div class="rule">
                    <input type="checkbox" id="c110" name="c110" value="110" checked>

                <div class="rule">
                    <input type="checkbox" id="c101" name="c101" value="101">

                <div class="rule">
                    <input type="checkbox" id="c100" name="c100" value="100" checked>
                    <label for="c100">100</label>
                </div>
                <div class="rule">
                    <input type="checkbox" id="c011" name="c011" value="011" checked>

                </div>
                <div class="rule">
                    <input type="checkbox" id="c010" name="c010" value="010">

                </div>
                <div class="rule">
                    <input type="checkbox" id="c001" name="c001" value="001" checked>

                </div>
                <div class="rule">
                    <input type="checkbox" id="c000" name="c000" value="000">
                    <label for="c000">000</label>
                </div>
            </div>
            <div id="animation">
                <input type="button" value="SIMPLERUN" onclick="simpRun()">

                <input type="button" value="STOP" onclick="stop()">
                <input type="button" value="STEP" onclick="iterate()">

        </div>
